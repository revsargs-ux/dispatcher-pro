<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Dispatcher.PRO</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
    .loading { color: #eee; text-align: center; padding: 40px; }
    .loading .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.1); border-top-color: #4ecdc4; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { opacity: .7; font-size: 14px; }
    .fallback { display: none; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Загрузка...</p>
  </div>
  <script>
    (function() {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      const userId = tg.initDataUnsafe?.user?.id || '';
      const firstName = tg.initDataUnsafe?.user?.first_name || '';
      const lastName = tg.initDataUnsafe?.user?.last_name || '';
      const username = tg.initDataUnsafe?.user?.username || '';

      // Сброс Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        });
        caches.keys().then(names => {
          names.forEach(name => caches.delete(name));
        });
      }

      const params = new URLSearchParams({
        tg_user_id: userId,
        tg_first_name: firstName,
        tg_last_name: lastName,
        tg_username: username,
        from_tg: '1',
        _v: Date.now()
      });

      // Переходим на серверный endpoint /app-worker с параметрами
      // Это НЕ редирект на другой домен — WebView WebApp должен пропустить
      window.location.href = '/app-worker?' + params.toString();
    })();
  </script>
</body>
</html>
