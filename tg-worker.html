<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Dispatcher.PRO</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
    .loading { color: #eee; text-align: center; padding: 40px; }
    .loading .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.1); border-top-color: #4ecdc4; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { opacity: .7; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Загрузка...</p>
  </div>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    const userId = tg.initDataUnsafe?.user?.id || '';
    const firstName = tg.initDataUnsafe?.user?.first_name || '';
    const lastName = tg.initDataUnsafe?.user?.last_name || '';
    const username = tg.initDataUnsafe?.user?.username || '';

    // Принудительный сброс кеша service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
      caches.keys().then(names => {
        names.forEach(name => caches.delete(name));
      });
    }

    // Вместо iframe — редирект на worker.html с параметрами
    // Это обходит X-Frame-Options: DENY от хостинга
    const params = new URLSearchParams({
      tg_user_id: userId,
      tg_first_name: firstName,
      tg_last_name: lastName,
      tg_username: username,
      from_tg: '1',
      _v: Date.now()
    });

    // Даём время на очистку кеша, потом редирект
    setTimeout(() => {
      window.location.replace('/worker.html?' + params.toString());
    }, 100);
  </script>
</body>
</html>
