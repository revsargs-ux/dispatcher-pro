version: '3.8'

services:
  dispatcher:
    image: n8n-dispatcher:latest
    container_name: n8n-dispatcher-1
    restart: unless-stopped
    ports:
      - '3000:8080'
    environment:
      - SB_URL=https://bzozrjgfnpdhlymfuobd.supabase.co
      - SB_KEY=sb_secret_7oItz51qISepnzMSsd8wEA_6vsbQbkK
      - TG_BOT_TOKEN=8362493681:AAGki_5MPHrG0E0jdyaiKJxucTu5nWCgxy8
      - MAX_BOT_TOKEN=f9LHodD0cOL_gerzW5lmO757Iljbw3W37i4k2du0aZlemfir6wpeu3n5di5rpvlP5w-tPUiaxcpMfaYcURiD
      - GAS_URL=https://script.google.com/macros/s/AKfycbxAaSeSu4r9XWofF60y6BnMURQMqg8wRPr2MUhKAymh4_yQZsTe5WQr3yF5dn5CCeOj/exec
      - GAS_WEBHOOK_SECRET=dp_gas_sync_2026
      - GEMINI_API_KEY=debb7da5d58f4471bbf01d319907c8cb.iyJ1bR3rVgkVMcFN
    volumes:
      - ./server.js:/app/server.js:ro
      - ./modules:/app/modules:ro
      - ./routes:/app/routes:ro
      - ./index.html:/app/index.html:ro
      - ./worker.html:/app/worker.html:ro
      - ./owner.html:/app/owner.html:ro
      - ./client.html:/app/client.html:ro
      - ./tg-worker.html:/app/tg-worker.html:ro
      - ./tg-client.html:/app/tg-client.html:ro
      - ./manifest.json:/app/manifest.json:ro
      - ./sw.js:/app/sw.js:ro
      - ./push-client.js:/app/push-client.js:ro
      - ./notifications-module:/app/notifications-module:ro
      - ./bot-knowledge.md:/app/bot-knowledge.md:ro
      - ./sql-setup.html:/app/sql-setup.html:ro
      - ./lang:/app/lang:ro
      - ./receipts:/app/receipts
      - ./data:/app/data
    networks:
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dispatcher.rule=Host(`xn----gtbdan3bddhceo9d.xn--p1ai`)"
      - "traefik.http.routers.dispatcher.entrypoints=web,websecure"
      - "traefik.http.routers.dispatcher.tls=true"
      - "traefik.http.routers.dispatcher.tls.certresolver=mytlschallenge"
      - "traefik.http.services.dispatcher.loadbalancer.server.port=8080"
      # IP router removed for security - access via domain only
      - "traefik.http.routers.dispatcher-tg.rule=Host(`bot.plus-rabochie.ru`) && PathPrefix(`/tg/`)"
      - "traefik.http.routers.dispatcher-tg.entrypoints=web,websecure"
      - "traefik.http.routers.dispatcher-tg.tls=true"
      - "traefik.http.routers.dispatcher-tg.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.dispatcher-tg.service=dispatcher"
      # Static HTML pages on bot.plus-rabochie.ru
      - "traefik.http.routers.dispatcher-static.rule=Host(`bot.plus-rabochie.ru`) && (PathPrefix(`/worker.html`) || PathPrefix(`/owner.html`) || PathPrefix(`/client.html`) || PathPrefix(`/index.html`) || PathPrefix(`/tg-worker.html`) || PathPrefix(`/tg-client.html`) || PathPrefix(`/sw.js`) || PathPrefix(`/manifest.json`) || PathPrefix(`/push-client.js`) || PathPrefix(`/sql-setup.html`) || PathPrefix(`/auth/`) || PathPrefix(`/api/`) || PathPrefix(`/version`) || PathPrefix(`/shift-photos/`))"
      - "traefik.http.routers.dispatcher-static.entrypoints=web,websecure"
      - "traefik.http.routers.dispatcher-static.tls=true"
      - "traefik.http.routers.dispatcher-static.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.dispatcher-static.service=dispatcher"

networks:
  default:
    external: true
    name: n8n_default
